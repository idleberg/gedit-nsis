name: CI

on:
  push:
    paths:
      - "*.lang"
  pull_request:
    paths:
      - "*.lang"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Validate XML
        run: xmllint --noout *.lang
